name: PyPI

on:
  push:
    tags:
      - "[0-9][0-9][0-9][0-9].04"
      - "[0-9][0-9][0-9][0-9].08"
      - "[0-9][0-9][0-9][0-9].12"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build package
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
