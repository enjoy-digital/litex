[pytest]
testpaths = test
python_files = test_*.py
addopts = -ra
markers =
    unit: Fast unit tests that do not require external toolchains.
    integration: End-to-end integration tests.
    slow: Tests with significantly longer runtimes.
    toolchain: Tests that depend on external FPGA or CPU toolchains.
    optional: Tests that depend on optional Python packages.
